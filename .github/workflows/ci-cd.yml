name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
  VM_HOST: ${{ secrets.VM_HOST }}
  VM_USER: ${{ secrets.VM_USER }}
  VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ env.DOCKER_HUB_USERNAME }}
        password: ${{ env.DOCKER_HUB_TOKEN }}

    - name: Build and push backend image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: ${{ env.DOCKER_HUB_USERNAME }}/mean-backend:latest,${{ env.DOCKER_HUB_USERNAME }}/mean-backend:${{ github.sha }}
        cache-from: type=registry,ref=${{ env.DOCKER_HUB_USERNAME }}/mean-backend:latest
        cache-to: type=inline

    - name: Build and push frontend image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: ${{ env.DOCKER_HUB_USERNAME }}/mean-frontend:latest,${{ env.DOCKER_HUB_USERNAME }}/mean-frontend:${{ github.sha }}
        cache-from: type=registry,ref=${{ env.DOCKER_HUB_USERNAME }}/mean-frontend:latest
        cache-to: type=inline

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.VM_SSH_KEY }}

    - name: Deploy to VM
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << EOF

          set -e

          mkdir -p ~/mean-app
          cd ~/mean-app

          if [ -d ".git" ]; then
            git pull origin main || git pull origin master
          else
            git clone https://github.com/${{ github.repository }}.git .
          fi

          echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

          export DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}

          docker compose down
          docker compose pull
          docker compose up -d

          docker image prune -f

        EOF
